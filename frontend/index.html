<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabBoard — Real-time Collaborative Whiteboard</title>
    <meta name="description" content="CollabBoard is a real-time collaborative whiteboard for teams to draw, annotate, and brainstorm together.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">

        <!-- TOOLBAR — Floating top bar -->
        <header id="toolbar">
            <div class="toolbar__section toolbar__section--left">
                <button id="toolbar-menu-btn" class="toolbar__btn toolbar__brand" title="CollabBoard Menu" aria-label="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                </button>
                <span id="toolbar-room-name" class="toolbar__room-name">CollabBoard</span>
            </div>

            <div class="toolbar__section toolbar__section--center">
                <div class="toolbar__tool-group">
                    <button id="tool-select" class="toolbar__btn toolbar__tool active" data-tool="select" title="Select (V)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
                    </button>
                    <div class="toolbar__separator"></div>
                    <button id="tool-pencil" class="toolbar__btn toolbar__tool" data-tool="pencil" title="Pencil (P)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    </button>
                    <button id="tool-text" class="toolbar__btn toolbar__tool" data-tool="text" title="Text (T)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                    </button>
                    <button id="tool-shapes" class="toolbar__btn toolbar__tool" data-tool="rectangle" title="Shapes (S)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    </button>
                    <button id="tool-image" class="toolbar__btn toolbar__tool" data-tool="image" title="Image (I)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    <div class="toolbar__separator"></div>
                    <div class="toolbar__color-wrapper">
                        <input type="color" id="tool-color" class="toolbar__color-input" value="#1a1a2e" title="Stroke Color">
                        <div class="toolbar__color-swatch" id="tool-color-swatch"></div>
                    </div>
                    <select id="tool-stroke-width" class="toolbar__select" title="Stroke Width">
                        <option value="2">2px</option>
                        <option value="4" selected>4px</option>
                        <option value="6">6px</option>
                        <option value="8">8px</option>
                        <option value="12">12px</option>
                    </select>
                </div>
            </div>

            <div class="toolbar__section toolbar__section--right">
                <div id="toolbar-participants" class="toolbar__participants"></div>
                <div class="toolbar__separator"></div>
                <button id="toolbar-export-btn" class="toolbar__btn" title="Export as PNG">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button id="toolbar-sidebar-toggle" class="toolbar__btn" title="Participants (U)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </button>
                <button id="toolbar-more-btn" class="toolbar__btn" title="More Options">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
            </div>
        </header>

        <!-- CANVAS CONTAINER — Dot-grid background + HTML5 Canvas -->
        <main id="canvas-container">
            <canvas id="canvas" width="1920" height="1080"></canvas>
            <div id="cursor-overlay"></div>
        </main>

        <!-- SIDEBAR — Participant list (hidden by default) -->
        <aside id="sidebar" class="sidebar" aria-hidden="true">
            <div class="sidebar__header">
                <h2 class="sidebar__title">Participants</h2>
                <button id="sidebar-close-btn" class="toolbar__btn sidebar__close" title="Close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <ul id="sidebar-participant-list" class="sidebar__list"></ul>
        </aside>

        <!-- STATUS BAR — Connection state, room code, save status -->
        <footer id="status-bar">
            <div class="status-bar__section status-bar__section--left">
                <span id="status-connection" class="status-bar__indicator status-bar__indicator--disconnected">
                    <span class="status-bar__dot"></span>
                    Disconnected
                </span>
            </div>
            <div class="status-bar__section status-bar__section--center">
                <span id="status-room" class="status-bar__room">No room</span>
            </div>
            <div class="status-bar__section status-bar__section--right">
                <span id="status-save" class="status-bar__save">—</span>
                <span id="status-users" class="status-bar__users">0 users</span>
            </div>
        </footer>

        <!-- ROOM MODAL — Join / Create room dialog (wired Day 3) -->
        <div id="room-modal" class="modal" aria-hidden="true">
            <div class="modal__backdrop"></div>
            <div class="modal__card">
                <h2 class="modal__title">Join CollabBoard</h2>
                <p class="modal__subtitle">Enter your name and a room code to get started.</p>
                <div class="modal__form">
                    <div class="modal__field">
                        <label for="modal-username" class="modal__label">Display Name</label>
                        <input type="text" id="modal-username" class="modal__input" placeholder="e.g. Aiko" maxlength="32" autocomplete="off">
                    </div>
                    <div class="modal__field">
                        <label for="modal-room-code" class="modal__label">Room Code</label>
                        <input type="text" id="modal-room-code" class="modal__input" placeholder="e.g. A1B2C3" maxlength="6" autocomplete="off">
                    </div>
                    <p id="modal-error" class="modal__error" aria-live="polite"></p>
                    <div class="modal__actions">
                        <button id="modal-join-btn" class="modal__btn modal__btn--primary">Join Room</button>
                        <button id="modal-create-btn" class="modal__btn modal__btn--secondary">Create New Room</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- HIDDEN FILE INPUT for Image Tool -->
        <input type="file" id="image-upload-input" accept="image/png, image/jpeg, image/webp" style="display: none;">

    </div>
    <script src="js/network.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/undo.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
